<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eureka</title>
    <meta name="description" content="Eureka는 지금 사람들이 가장 궁금해하는 기술, 경제, 글로벌, 정치, 산업, 과학, 문화, 스포츠 이슈를 장문으로 정리하는 정적 위키 매거진입니다." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://lifeiz0415.github.io/EUREKA/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="Eureka" />
    <meta property="og:title" content="Eureka" />
    <meta property="og:description" content="지금 사람들이 가장 궁금해하는 주제를 분야별 장문 페이지로 읽는 정적 위키 매거진입니다." />
    <meta property="og:url" content="https://lifeiz0415.github.io/EUREKA/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Eureka" />
    <meta name="twitter:description" content="지금 사람들이 가장 궁금해하는 주제를 분야별 장문 페이지로 읽는 정적 위키 매거진입니다." />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f7e7a4'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-size='38'%3E%F0%9F%92%A1%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__inner">
        <h1 class="brand"><a class="brand-link" href="./" aria-label="Eureka 메인으로 이동">💡 EUREKA</a></h1>
        <label class="search-field" for="page-search">
          <input id="page-search" type="search" placeholder="관심 있는 주제를 검색하세요" aria-label="페이지 검색" />
        </label>
      </div>
      <nav id="desk-menu" class="desk-menu" aria-label="분야별 메뉴"></nav>
    </header>

    <main class="layout">
      <section id="list-view" class="panel">
        <div class="section-head">
          <div>
            <h2 id="list-heading">🔥 지금 사람들이 많이 궁금해하는 주제</h2>
          </div>
        </div>
        <div id="page-list" class="home-sections"></div>
        <p id="empty-state" class="empty-state" hidden>검색 결과가 없습니다.</p>
      </section>

      <article id="article-view" class="panel article-view" hidden>
        <p id="article-desk" class="eyebrow"></p>
        <h2 id="article-title"></h2>
        <p id="article-meta" class="article-meta"></p>
        <p id="article-summary" class="article-summary"></p>
        <div class="article-tools">
          <button id="voice-button" class="secondary-button" type="button">음성으로 읽어주기</button>
          <div id="translate-buttons" class="translate-control" aria-label="번역 언어 선택"></div>
          <span id="voice-status" class="muted" role="status"></span>
          <span id="translate-status" class="visually-hidden" role="status"></span>
        </div>
        <section class="newsletter-panel article-newsletter article-newsletter--top">
          <div class="section-head" hidden>
            <div>
              <h2 id="newsletter-title"></h2>
            </div>
          </div>
          <p id="newsletter-copy" class="newsletter-copy" hidden></p>
          <form id="newsletter-form" class="newsletter-form">
            <input id="newsletter-email" name="email" type="email" placeholder="귀하의 이메일 주소로 최신 무료 뉴스레터를 신청하세요 ( you@email.com)" required />
            <button class="primary-button" type="submit">뉴스레터 신청</button>
          </form>
          <p id="newsletter-message" class="muted"></p>
        </section>
        <div id="article-body" class="article-body"></div>
      </article>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
  </html>
